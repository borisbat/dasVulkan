name: Build documentation

# Regenerates the boost-layer reference with vulkan2rst, builds the Sphinx site,
# and deploys it to GitHub Pages. vulkan2rst introspects the loaded modules via
# RTTI — it loads the dasVulkan .shared_module but never creates a Vulkan
# instance, so this job needs NO GPU and NO lavapipe (unlike tests.yml). The
# heavy step is the one-time native-module compile; sccache keeps reruns cheap.
#
# No `paths:` filter — every push/PR rebuilds. A path filter would let changes
# under examples/** or the generated bindings silently skip the build and leave
# the published site stale. The Sphinx build is cheap enough that always-rebuild
# is the safer default.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# One Pages deployment at a time.
concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

# Split into build + deploy jobs: attaching `environment: github-pages` to a job
# triggers GitHub's deployment-branch protection check before any step runs,
# which instant-fails non-master refs (PRs, workflow_dispatch from a branch).
# build runs on every push/PR; deploy only runs on master and is the only job
# with the environment attached.
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    defaults:
      run:
        shell: bash
    steps:
      - name: "Checkout daslang"
        uses: actions/checkout@v4
        with:
          repository: GaijinEntertainment/daScript
          path: daslang-src
          ref: master

      - name: "Checkout dasVulkan"
        uses: actions/checkout@v4
        with:
          path: dasVulkan

      - name: "Install CMake and Ninja"
        uses: lukka/get-cmake@latest

      - name: "Set up sccache"
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: "Install Python dependencies"
        run: pip install -r daslang-src/doc/requirements.txt

      - name: "Build daslang"
        working-directory: daslang-src
        # Only the daslang binary + its shared runtime libs are needed. The
        # generated dasVulkan C++ is committed, so no generator run in CI —
        # pugixml/LLVM/HV/GLFW are all unnecessary.
        run: |
          set -eux
          cmake --no-warn-unused-cli -B./build \
            -DCMAKE_BUILD_TYPE:STRING=Release \
            -DDAS_HV_DISABLED=ON \
            -DDAS_PUGIXML_DISABLED=ON \
            -DDAS_LLVM_DISABLED=ON \
            -DDAS_GLFW_DISABLED=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -G Ninja
          cmake --build ./build --parallel --target daslang
          sccache --show-stats

      - name: "Build the dasVulkan native module"
        # vulkan2rst requires `vulkan/vulkan_boost`, whose require chain pulls in
        # the raw `vulkan` C++ module — so the .shared_module must exist and be
        # loadable. Bounded `--parallel 2` over Ninja + sccache (daspkg's
        # unbounded `make -j` OOMs the runner on the template-heavy generated TUs).
        run: |
          set -eux
          cmake -S "${GITHUB_WORKSPACE}/dasVulkan" -B "${GITHUB_WORKSPACE}/dasVulkan/_build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDASLANG_DIR="${GITHUB_WORKSPACE}/daslang-src" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build "${GITHUB_WORKSPACE}/dasVulkan/_build" --config Release --parallel 2
          sccache --show-stats
          ls -la "${GITHUB_WORKSPACE}/dasVulkan"/*.shared_module

      - name: "Run vulkan2rst"
        # Regenerate the boost-layer reference from the live RTTI surface so the
        # committed generated/*.rst can never drift from the code. The handmade
        # module-intro stubs already exist (committed, filled), so this only
        # overwrites generated/ and leaves handmade/ untouched.
        working-directory: ${{ github.workspace }}/dasVulkan
        run: |
          set -eux
          "${GITHUB_WORKSPACE}/daslang-src/bin/daslang" \
            -load_module "${GITHUB_WORKSPACE}/dasVulkan" \
            utils/vulkan2rst.das

      - name: "Stub-gate: handmade/ must not contain '// stub'"
        working-directory: ${{ github.workspace }}/dasVulkan
        run: |
          set -eux
          if grep -rl '// stub' doc/source/stdlib/handmade/; then
            echo "ERROR: Found '// stub' placeholders in handmade docs."
            echo "Fill the module intros before merging."
            exit 1
          fi

      - name: "Uncategorized-gate: every documented function must belong to a group"
        working-directory: ${{ github.workspace }}/dasVulkan
        run: |
          set -eux
          if grep -rl '^Uncategorized$' doc/source/stdlib/generated/; then
            echo "ERROR: Found 'Uncategorized' sections in generated docs."
            echo "Add the function(s) to a group_by_regex() in utils/vulkan2rst.das."
            exit 1
          fi

      - name: "Build Sphinx HTML"
        working-directory: ${{ github.workspace }}/dasVulkan
        run: |
          set -eux
          sphinx-build -W --keep-going \
            -b html -d build/sphinx-cache \
            doc/source build/site

      - name: "Stage site"
        working-directory: ${{ github.workspace }}/dasVulkan
        run: |
          set -eux
          mkdir -p _site
          cp -r build/site/. _site/
          # Disable Jekyll: GitHub Pages otherwise drops underscore-prefixed
          # Sphinx asset directories (_static/, _sources/, ...).
          touch _site/.nojekyll

      - name: "Upload Pages artifact"
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/dasVulkan/_site

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
